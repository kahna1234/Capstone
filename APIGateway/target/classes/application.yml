server:
  port: 8088

spring:
  application:
    name: apigateway

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cloud:
    gateway:

      # CORS CONFIG
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://frontend:3000"
              - "http://host.docker.internal:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: userauthservice
          uri: lb://USERAUTHSERVICE
          predicates:
            - Path=/auth/**, /users/**

        - id: productcatalogservice
          uri: lb://productcatalogservice
          predicates:
            - Path=/products/**, /search/**

        - id: orderservice
          uri: lb://orderservice
          predicates:
            - Path=/orders/**

        - id: paymentservice
          uri: lb://paymentservice
          predicates:
            - Path=/api/payments/**, /api/stripewebhook, /api/stripewebhook/**

        - id: emailservice
          uri: lb://emailservice
          predicates:
            - Path=/email/**

        - id: inventoryservice
          uri: lb://inventoryservice
          predicates:
            - Path=/inventory/**

        - id: cartservice
          uri: lb://cartservice
          predicates:
            - Path=/cart/**

  main:
    allow-bean-definition-overriding: true

# Eureka
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://service-discovery:8761/eureka/
  instance:
    prefer-ip-address: true

