server:
  port: 8088

spring:
  application:
    name: apigateway

  main:
    allow-bean-definition-overriding: true

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cloud:
    gateway:

      # 🌍 GLOBAL CORS CONFIG
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://frontend:3000"
              - "http://host.docker.internal:3000"
              - "https://gavialoid-makeda-preobediently.ngrok-free.dev"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:

        # 🔐 AUTH SERVICE (relaxed)
        - id: userauthservice
          uri: lb://USERAUTHSERVICE
          predicates:
            - Path=/auth/**, /users/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
            - name: CircuitBreaker
              args:
                name: authCircuit
                fallbackUri: forward:/fallback/auth
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY, GATEWAY_TIMEOUT

        # 🛍 PRODUCT SERVICE
        - id: productcatalogservice
          uri: lb://PRODUCTCATALOGSERVICE
          predicates:
            - Path=/products/**, /search/**
          filters:
            - name: CircuitBreaker
              args:
                name: productCircuit
                fallbackUri: forward:/fallback/products
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY, GATEWAY_TIMEOUT

        # 📦 ORDER SERVICE
        - id: orderservice
          uri: lb://ORDERSERVICE
          predicates:
            - Path=/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 8
                redis-rate-limiter.burstCapacity: 16
            - name: CircuitBreaker
              args:
                name: orderCircuit
                fallbackUri: forward:/fallback/orders
            - name: Retry
              args:
                retries: 2

        # 💳 PAYMENT SERVICE (STRICT)
        - id: paymentservice
          uri: lb://PAYMENTSERVICE
          predicates:
            - Path=/api/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
            - name: CircuitBreaker
              args:
                name: paymentCircuit
                fallbackUri: forward:/fallback/payments
            - name: Retry
              args:
                retries: 1   # avoid duplicate payment risk

        # 💳 STRIPE WEBHOOK (PUBLIC, NO RATE LIMIT)
        - id: stripewebhook
          uri: lb://PAYMENTSERVICE
          predicates:
            - Path=/api/stripewebhook, /api/stripewebhook/**

        # 📧 EMAIL SERVICE
        - id: emailservice
          uri: lb://EMAILSERVICE
          predicates:
            - Path=/email/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
            - name: CircuitBreaker
              args:
                name: emailCircuit
                fallbackUri: forward:/fallback/email

        # 📦 INVENTORY SERVICE
        - id: inventoryservice
          uri: lb://INVENTORYSERVICE
          predicates:
            - Path=/inventory/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
            - name: CircuitBreaker
              args:
                name: inventoryCircuit
                fallbackUri: forward:/fallback/inventory

        # 🛒 CART SERVICE
        - id: cartservice
          uri: lb://CARTSERVICE
          predicates:
            - Path=/cart/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
            - name: CircuitBreaker
              args:
                name: cartCircuit
                fallbackUri: forward:/fallback/cart

# 🔁 RESILIENCE4J CONFIG (FIXED)
resilience4j:
  circuitbreaker:
    instances:

      authCircuit:
        failureRateThreshold: 50
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s

      productCircuit:
        failureRateThreshold: 50
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 10s

      orderCircuit:
        failureRateThreshold: 50
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 10s

      paymentCircuit:
        failureRateThreshold: 30
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 20s

      emailCircuit:
        failureRateThreshold: 70
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s

      inventoryCircuit:
        failureRateThreshold: 50
        slidingWindowSize: 15
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s

      cartCircuit:
        failureRateThreshold: 50
        slidingWindowSize: 15
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s

  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 500ms

# 🌐 EUREKA
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://service-discovery:8761/eureka/
  instance:
    prefer-ip-address: true

