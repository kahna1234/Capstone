server:
  port: 8088

spring:
  application:
    name: apigateway

  main:
    allow-bean-definition-overriding: true

  data:
    redis:
      host: redis   # use localhost for local dev
      port: 6379
      timeout: 2000ms

  cloud:
    gateway:

      # 🔐 GLOBAL SECURITY HEADERS
      default-filters:
        - AddResponseHeader=X-Content-Type-Options, nosniff
        - AddResponseHeader=X-Frame-Options, DENY
        - AddResponseHeader=X-XSS-Protection, 1; mode=block

      # ⏱ TIMEOUT CONFIG
      httpclient:
        connect-timeout: 3000
        response-timeout: 5s

      # 🌍 CORS
      globalcors:
        # Helps ensure preflight OPTIONS is handled consistently
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            # You can pin the frontend origin via CORS_ALLOWED_ORIGIN,
            # otherwise we default to localhost dev + allow ngrok hostnames via pattern.
            allowedOrigins:
              - "${CORS_ALLOWED_ORIGIN:http://localhost:3000}"
              - "http://localhost:3000"
              - "http://localhost:8088"
              - "https://localhost:8088"
            allowedOriginPatterns:
              - "${CORS_ALLOWED_ORIGIN_PATTERN:https://*.ngrok-free.dev}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-User-Id
              - X-User-Roles
            allowCredentials: true

      routes:

        # 🔐 AUTH SERVICE
        - id: auth-service
          uri: lb://userauthservice
          predicates:
            - Path=/auth/**, /users/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
            - name: CircuitBreaker
              args:
                name: authCircuit
                fallbackUri: forward:/fallback/auth

        # 🛍 PRODUCT SERVICE
        - id: product-service
          uri: lb://PRODUCTCATALOGSERVICE
          predicates:
            - Path=/products/**, /search/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
            - name: CircuitBreaker
              args:
                name: productCircuit
                fallbackUri: forward:/fallback/products

        # 📦 ORDER SERVICE
        - id: order-service
          uri: lb://orderservice
          predicates:
            - Path=/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 8
                redis-rate-limiter.burstCapacity: 16
            - name: CircuitBreaker
              args:
                name: orderCircuit
                fallbackUri: forward:/fallback/orders
            - name: Retry
              args:
                retries: 2

        # 💳 PAYMENT SERVICE
        - id: payment-service
          uri: lb://paymentservice
          predicates:
            - Path=/api/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
            - name: CircuitBreaker
              args:
                name: paymentCircuit
                fallbackUri: forward:/fallback/payments
            - name: Retry
              args:
                retries: 1

        # 💳 STRIPE WEBHOOK
        - id: stripe-webhook
          uri: lb://paymentservice
          predicates:
            - Path=/api/stripewebhook, /api/stripewebhook/**

        # 📦 INVENTORY SERVICE
        - id: inventory-service
          uri: lb://inventoryservice
          predicates:
            - Path=/inventory/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
            - name: CircuitBreaker
              args:
                name: inventoryCircuit
                fallbackUri: forward:/fallback/inventory

        # 🛒 CART SERVICE
        - id: cart-service
          uri: lb://cartservice
          predicates:
            - Path=/cart/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
            - name: CircuitBreaker
              args:
                name: cartCircuit
                fallbackUri: forward:/fallback/cart

# 🔁 RESILIENCE4J
resilience4j:
  circuitbreaker:
    instances:
      default:
        failureRateThreshold: 50
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 10s
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50

  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true

# 🌐 EUREKA
eureka:
  client:
    service-url:
      defaultZone: http://service-discovery:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

