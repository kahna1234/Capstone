worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ✅ INCLUDE UPSTREAMS
    include /etc/nginx/conf.d/upstreams.conf;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Disable gzip for sub_filter to work
    gzip off;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;

    # =========================
    # 🌐 MAIN SERVER
    # =========================
    server {
        listen 80;
        server_name localhost;

        # -------------------------
        # 🟢 STATIC FILES
        # -------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # -------------------------
        # 🟢 FRONTEND
        # -------------------------
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Inject API_BASE_URL for local development
            sub_filter '<head>' '<head><script>window.__RUNTIME_CONFIG__ = { API_BASE_URL: "" };</script>';
            sub_filter_types *;
            sub_filter_once on;
        }

        # -------------------------
        # 💳 PAYMENT (DIRECT - FAST PATH)
        # -------------------------
        location /api/payments {
            proxy_pass http://payment_service;   # ✅ upstream used
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # -------------------------
        # 💳 STRIPE WEBHOOK (DIRECT)
        # -------------------------
        location /api/stripewebhook {
            proxy_pass http://payment_service;   # ✅ upstream used
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # -------------------------
        # 🌐 ALL OTHER APIs → API GATEWAY
        # -------------------------
        location /api/ {
            proxy_pass http://api_gateway;   # ✅ gateway upstream
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # -------------------------
        # 🔐 AUTH (explicit for clarity)
        # -------------------------
        location /auth/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        # -------------------------
        # 🛍 PRODUCTS
        # -------------------------
        location /products {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        location /categories {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        location /search {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        # -------------------------
        # 📦 ORDERS
        # -------------------------
        location /orders {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        # -------------------------
        # 🛒 CART
        # -------------------------
        location /cart {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        # -------------------------
        # 📦 INVENTORY
        # -------------------------
        location /inventory {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        # -------------------------
        # 📧 EMAIL
        # -------------------------
        location /email {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

    }

    # =========================
    # ❤️ HEALTH CHECK
    # =========================
    server {
        listen 8080;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}