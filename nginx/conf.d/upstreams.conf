# =========================
# 🔥 UPSTREAM DEFINITIONS
# =========================

# API Gateway (REQUIRED)
upstream api_gateway {
    least_conn;
    server api-gateway:8088 max_fails=3 fail_timeout=30s;
    # future scaling:
    # server api-gateway-2:8088;
}

# Payment Service (DIRECT ROUTING)
upstream payment_service {
    least_conn;
    server payment-service:8085 max_fails=3 fail_timeout=30s;
    # server payment-service-2:8085;
}