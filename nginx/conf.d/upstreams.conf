# API Gateway upstream
upstream api-gateway {
    least_conn;
    server api-gateway:8088 max_fails=3 fail_timeout=30s;
}

# Product Service upstream
upstream product-service {
    least_conn;
    server product-service:8084 max_fails=3 fail_timeout=30s;
}

# Order Service upstream
upstream order-service {
    least_conn;
    server order-service:8083 max_fails=3 fail_timeout=30s;
}

# Payment Service upstream
upstream payment-service {
    least_conn;
    server payment-service:8085 max_fails=3 fail_timeout=30s;
}

# User Auth Service upstream
upstream user-auth-service {
    least_conn;
    server user-auth-service:8082 max_fails=3 fail_timeout=30s;
}

# Email Service upstream
upstream email-service {
    least_conn;
    server email-service:8081 max_fails=3 fail_timeout=30s;
}

# Inventory Service upstream
upstream inventory-service {
    least_conn;
    server inventory-service:8086 max_fails=3 fail_timeout=30s;
}

# Cart Service upstream
upstream cart-service {
    least_conn;
    server cart-service:8087 max_fails=3 fail_timeout=30s;
}
