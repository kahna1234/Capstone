events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # API routes - proxy to nginx-lb or api-gateway
        location /api/ {
            proxy_pass http://nginx-lb:80/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /products {
            proxy_pass http://nginx-lb:80/products;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /search {
            proxy_pass http://nginx-lb:80/search;
            proxy_set_header Host $host;
        }

        location /orders {
            proxy_pass http://nginx-lb:80/orders;
            proxy_set_header Host $host;
        }

        location /cart {
            proxy_pass http://nginx-lb:80/cart;
            proxy_set_header Host $host;
        }

        location /inventory {
            proxy_pass http://nginx-lb:80/inventory;
            proxy_set_header Host $host;
        }

        location /email {
            proxy_pass http://nginx-lb:80/email;
            proxy_set_header Host $host;
        }

        location /auth/ {
            proxy_pass http://nginx-lb:80/auth/;
            proxy_set_header Host $host;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
