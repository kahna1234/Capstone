version: '3.9'

networks:
  capstone-network:
    driver: bridge

services:

  nginx-lb:
    image: localhost/ecommerce-nginx:latest
    container_name: nginx-lb
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8090:80"
      - "8081:80"
    depends_on:
      - api-gateway
      - frontend
    networks:
      - capstone-network
    restart: unless-stopped

  frontend:
    image: localhost/frontend:latest
    container_name: frontend
    ports:
      - "3000:80"
    expose:
      - "80"
    networks:
      - capstone-network
    restart: unless-stopped

  mysql:
    image: docker.io/library/mysql:8.4
    container_name: mysql
    ports:
      - "3307:3306"
    env_file:
      - .env
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - capstone-network

  zookeeper:
    image: docker.io/confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - capstone-network

  kafka:
    image: docker.io/confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - capstone-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - capstone-network

  service-discovery:
    image: localhost/servicediscovery:latest
    container_name: service-discovery
    ports:
      - "8761:8761"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - capstone-network

  api-gateway:
    image: localhost/apigateway:latest
    container_name: api-gateway
    ports:
      - "8088:8088"
    depends_on:
      service-discovery:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGIN=${CORS_ALLOWED_ORIGIN}
      - CORS_ALLOWED_ORIGIN_PATTERN=${CORS_ALLOWED_ORIGIN_PATTERN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - capstone-network

  product-service:
    image: localhost/productcatalogservice:latest
    container_name: product-service
    expose:
      - "8084"
    depends_on:
      service-discovery:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_started
    env_file:
      - .env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/product_catalog_service
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - capstone-network

  order-service:
    image: localhost/orderservice:latest
    container_name: order-service
    expose:
      - "8083"
    depends_on:
      service-discovery:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/orderservice
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - capstone-network

  payment-service:
    image: localhost/paymentservice:latest
    container_name: payment-service
    expose:
      - "8085"
    depends_on:
      service-discovery:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/paymentservice
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - capstone-network

  user-auth-service:
    image: localhost/userauthservice:latest
    container_name: user-auth-service
    expose:
      - "8082"
    depends_on:
      service-discovery:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/user_auth_service
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_SECRET=${JWT_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - capstone-network

  email-service:
    image: localhost/emailservice:latest
    container_name: email-service
    expose:
      - "8081"
    depends_on:
      service-discovery:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - capstone-network

  inventory-service:
    image: localhost/inventoryservice:latest
    container_name: inventory-service
    expose:
      - "8086"
    depends_on:
      service-discovery:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/inventoryservice
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PRODUCT_CATALOG_BASE_URL=http://api-gateway:8088
      - BOOTSTRAP_INVENTORY_ENABLED=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - capstone-network

  cart-service:
    image: localhost/cartservice:latest
    container_name: cart-service
    expose:
      - "8087"
    depends_on:
      service-discovery:
        condition: service_started
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/cartservice
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - capstone-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capstone-network

volumes:
  mysql-data: