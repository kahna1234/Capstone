spring.application.name=paymentservice
server.port=8085
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

razorpay.keyId=${RAZORPAY_KEY_ID}
razorpay.keySecret=${RAZORPAY_KEY_SECRET}

stripe.apiKey=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
frontend.baseUrl=${FRONTEND_BASE_URL:http://localhost:3000}
payment.reconciliation.enabled=${PAYMENT_RECONCILIATION_ENABLED:true}
payment.reconciliation.cron=${PAYMENT_RECONCILIATION_CRON:0 */5 * * * *}
payment.reconciliation.lookbackMinutes=${PAYMENT_RECONCILIATION_LOOKBACK_MINUTES:60}
payment.reconciliation.minAgeMinutes=${PAYMENT_RECONCILIATION_MIN_AGE_MINUTES:5}


eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://service-discovery:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.main.allow-bean-definition-overriding=true
